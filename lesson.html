<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Lekcja</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;min-height:100vh}
h1,h2,h3,h4{font-family:'Playfair Display',serif}
:root{
  --cream:#faf7f2;--ink:#1a1410;
  --amber:#d4800a;--amber-light:#f5c842;
  --teal:#2a7c76;--teal-light:#e8f5f4;
  --coral:#e85d3a;--coral-light:#fdf0ec;
  --purple:#5b3fa6;--purple-light:#f0ecfb;
  --border:#ddd8ce;
  --card-shadow:0 4px 24px rgba(26,20,16,0.08);
  --radius:14px;
  --blue:#1a1410;--blue-mid:#d4800a;--blue-light:#e8f5f4;
  --yellow:#f5c842;--green:#2a7c76;--red:#e85d3a;
  --orange:#d4800a;--purple-p:#5b3fa6;--pink:#5b3fa6
}

/* NAV */
.nav-bar{position:sticky;top:0;z-index:200;background:var(--ink);display:flex;align-items:center;gap:4px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.nav-bar::-webkit-scrollbar{display:none}
.back-btn{color:rgba(255,255,255,0.55);text-decoration:none;background:transparent;border:none;border-radius:8px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;white-space:nowrap;transition:all .2s;cursor:pointer}
.back-btn:hover{background:var(--amber);color:var(--ink)}
.nav-tabs{display:flex;flex:1;gap:4px;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{background:transparent;color:rgba(255,255,255,0.55);border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s}
.nav-tab.active,.nav-tab:hover{background:var(--amber);color:var(--ink)}
.save-indicator{color:rgba(255,255,255,0.55);font-size:.75rem;padding:0 10px;white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:500;transition:opacity .6s;opacity:0;flex-shrink:0}

/* SECTIONS */
.section{display:none;max-width:860px;margin:0 auto;padding:40px 24px 80px}
.section.active{display:block}

/* LESSON HEADER */
.lesson-header{text-align:center;margin-bottom:48px}
.hdr-emoji{display:none}
.badge{display:inline-block;background:var(--amber);color:var(--ink);font-weight:600;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:16px;font-family:'DM Sans',sans-serif}
.lesson-header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3rem);line-height:1.1;margin-bottom:12px}
.lesson-header p{font-size:1.05rem;color:#5a5248;max-width:520px;margin:0 auto}

/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:26px;margin-bottom:20px;box-shadow:var(--card-shadow)}
.card h3{font-size:1rem;font-weight:600;margin-bottom:14px;color:var(--ink);font-family:'Playfair Display',serif}
.card.green{border-top:3px solid var(--teal)}
.card.red{border-top:3px solid var(--coral)}
.card.yellow{border-top:3px solid var(--amber)}
.card.purple{border-top:3px solid var(--purple)}
.card.orange{border-top:3px solid var(--amber)}
.card.pink{border-top:3px solid var(--purple)}

/* VOCAB */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:.5rem}
.vocab-item{background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:14px;text-align:center;transition:all .2s;position:relative}
.vocab-item:hover{border-color:var(--amber);background:#fffdf7;transform:translateY(-2px)}
.vocab-item .vi-emoji{font-size:1.8rem;margin-bottom:4px}
.vocab-item .vi-pl{font-weight:600;font-size:.95rem;color:var(--ink);font-family:'DM Sans',sans-serif}
.vocab-item .vi-en{font-size:.75rem;color:#5a5248;margin-top:2px}
.save-btn{position:absolute;top:6px;right:6px;background:none;border:1px solid var(--border);border-radius:5px;padding:2px 5px;font-size:.7rem;cursor:pointer;color:#aaa;display:none}
.vocab-item:hover .save-btn{display:block}
.save-btn:hover,.save-btn.saved{background:var(--teal);color:white;border-color:var(--teal);display:block}

/* TABLES */
table{width:100%;border-collapse:collapse;margin-top:.5rem;font-size:.9rem}
th{background:var(--ink);color:var(--cream);padding:10px 12px;text-align:left;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:.04em;font-size:.85rem}
td{padding:9px 12px;border-bottom:1px solid var(--border)}
tr:nth-child(even) td{background:#f5f2ed}
.pl-word{font-weight:600;color:var(--ink);font-size:1rem}
.en-word{color:#5a5248}

/* GRAMMAR */
.grammar-box{background:#fff9ee;border:1.5px solid var(--amber);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.grammar-box h4{color:var(--amber);font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:12px}
.grammar-box p{font-size:.88rem;color:#5a5248;line-height:1.7}
.tip-box{background:var(--teal-light);border-left:3px solid var(--teal);border-radius:0 8px 8px 0;padding:10px 14px;margin:.8rem 0;font-size:.9rem;color:#1a5a55}
.tip-box strong{color:var(--teal)}
.ex-box{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:0 8px 8px 0;padding:.8rem 1rem;margin:.5rem 0}
.ex-box .ex-pl{font-weight:700;color:#1a5a55;font-size:1rem}
.ex-box .ex-en{color:#5a5248;font-size:.88rem}

/* READING */
.reading-box{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:32px 36px;margin-bottom:20px;box-shadow:var(--card-shadow)}
.reading-box h3{color:var(--ink);margin-bottom:1rem;font-family:'Playfair Display',serif;font-size:1.3rem}
.reading-text{font-size:.95rem;line-height:1.9;color:var(--ink)}
/* highlight classes for teacher-authored reading texts */
.hl{background:rgba(212,128,10,.15);border-radius:3px;padding:0 3px;font-weight:600;color:var(--ink)}
.hlg{background:var(--teal-light);border-radius:3px;padding:0 3px;font-weight:600;color:#1a5a55}

/* EXERCISES */
.exercise-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:26px;margin-bottom:20px;box-shadow:var(--card-shadow)}
.exercise-card h4{color:var(--ink);font-size:1.1rem;font-family:'Playfair Display',serif;margin-bottom:.4rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.ex-desc{font-size:.84rem;color:#7a6a50;margin-bottom:1rem}
.quiz-q{margin-bottom:1.2rem}
.quiz-q p{font-weight:500;margin-bottom:.6rem;color:var(--ink);font-size:.95rem}
.quiz-opts{display:flex;flex-wrap:wrap;gap:8px}
.qopt{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s;color:var(--ink);font-weight:500}
.qopt:hover:not(:disabled){border-color:var(--amber);background:#fffdf7}
.qopt.correct{background:var(--teal-light)!important;border-color:var(--teal)!important;color:var(--teal)!important}
.qopt.wrong{background:var(--coral-light)!important;border-color:var(--coral)!important;color:var(--coral)!important}
.qopt:disabled{cursor:default}
.feedback{margin-top:14px;padding:10px 16px;border-radius:10px;font-size:.88rem;display:none}
.feedback.ok,.feedback.good{display:block;background:var(--teal-light);color:#1a5a55}
.feedback.bad{display:block;background:var(--coral-light);color:#a02515}

/* FILL */
.fill-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;font-size:.93rem}
.fill-input{border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:1rem;width:160px;text-align:center;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--ink);outline:none;transition:border .2s}
.fill-input:focus{border-color:var(--amber)}
.fill-input.correct{border-color:var(--teal);background:var(--teal-light);color:#1a5a55}
.fill-input.wrong{border-color:var(--coral);background:var(--coral-light);color:var(--coral)}
.fill-hint{font-size:.8rem;color:#aaa;font-style:italic}
.check-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;background:var(--ink);color:var(--cream);margin-top:.8rem}
.check-btn:hover{background:var(--amber);color:var(--ink)}
.write-box{width:100%;min-height:80px;margin-top:.5rem;border:1.5px dashed var(--border);border-radius:10px;padding:.8rem 1rem;font-size:.9rem;font-family:'DM Sans',sans-serif;color:var(--ink);resize:vertical;outline:none;transition:border .2s}
.write-box:focus{border-color:var(--amber);border-style:solid}
.write-box::placeholder{color:#aaa;font-style:italic}

/* SPEAKING */
.speak-card{background:linear-gradient(135deg,var(--purple-light) 0%,#fff 100%);border:1.5px solid #c8bff0;border-radius:var(--radius);padding:22px;margin-bottom:14px}
.speak-card h4{color:var(--ink);margin-bottom:.8rem}
.speak-prompt{background:white;border-radius:8px;padding:.8rem 1rem;margin:6px 0;font-size:.92rem;color:var(--ink);border-left:3px solid var(--amber)}
.speak-answer{font-size:.85rem;color:#5a5248;background:var(--teal-light);border-radius:6px;padding:6px 10px;margin-top:4px;border-left:3px solid var(--teal);display:none}
.ans-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:.78rem;cursor:pointer;color:#666;margin-top:4px}
.ans-btn:hover{background:#f5f2ed}

/* MATCHING */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;transition:all .2s;font-size:.9rem}
.match-item:hover{border-color:var(--amber)}
.match-item.selected{border-color:var(--purple);background:var(--purple-light)}
.match-item.matched{border-color:var(--teal);background:var(--teal-light);pointer-events:none}
.match-item.wrong-match{border-color:var(--coral);background:var(--coral-light)}

/* FLASHCARDS */
.fc-wrap{perspective:1000px;margin:1rem auto;max-width:400px}
.flashcard{width:100%;height:200px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer}
.flashcard.flipped{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center}
.fc-front{background:var(--ink);color:white}
.fc-back{background:var(--cream);color:var(--ink);transform:rotateY(180deg);border:2px solid var(--border)}
.fc-emoji{font-size:2.5rem;margin-bottom:.3rem}
.fc-word{font-size:1.6rem;font-weight:700;font-family:'Playfair Display',serif;margin-bottom:.2rem;color:var(--amber-light)}
.fc-hint{font-size:.85rem;opacity:.7}
.fc-trans{font-size:1.4rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--coral);margin-bottom:.2rem}
.fc-ex{font-size:.85rem;color:#5a5248}
.fc-ctrls{display:flex;justify-content:center;gap:12px;margin-top:1rem;flex-wrap:wrap}
.fc-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;background:var(--ink);color:var(--cream)}
.fc-btn:hover{background:var(--amber);color:var(--ink)}
.fc-btn.sec{background:var(--cream);color:var(--ink);border:1.5px solid var(--border)}
.fc-btn.sec:hover{border-color:var(--ink)}
.fc-btn.know{background:var(--teal);color:white}.fc-btn.know:hover{background:#1f5f5a}
.fc-btn.nope{background:var(--coral);color:white}.fc-btn.nope:hover{background:#c44020}

/* PROGRESS */
.prog-bar{background:var(--border);border-radius:2px;height:4px;margin-bottom:.3rem;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--amber);transition:width .4s ease}

/* HOMEWORK */
.hw-task{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem;margin-bottom:1rem;box-shadow:var(--card-shadow);display:flex;gap:1rem;align-items:flex-start}
.hw-num{background:var(--coral);color:white;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;font-family:'DM Sans',sans-serif;flex-shrink:0;margin-top:2px}
.hw-body{flex:1}
.hw-task h4{color:var(--ink);font-size:.95rem;margin-bottom:.4rem}
.hw-task p{font-size:.88rem;color:#5a5248;line-height:1.7}
.cl-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.cl-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--teal);cursor:pointer}
.cl-item label{font-size:.9rem;color:var(--ink);cursor:pointer}
.cl-item.done label{text-decoration:line-through;color:#aaa}

/* MY WORDS */
.mw-item{background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.mw-pl{font-weight:600;color:var(--ink)}
.mw-en{color:#5a5248;font-size:.9rem}
.mw-del{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:.75rem;cursor:pointer;color:#aaa}
.mw-del:hover{background:var(--coral-light);border-color:var(--coral);color:var(--coral)}

/* MISC */
.loading{text-align:center;padding:3rem;font-size:1.5rem;color:#5a5248}
.err-box{background:var(--coral-light);border:2px solid var(--coral);border-radius:var(--radius);padding:2rem;margin:2rem auto;max-width:500px;text-align:center;color:var(--coral)}
.poss-m{color:var(--ink);font-weight:700}
.poss-f{color:var(--purple);font-weight:700}
.poss-n{color:var(--amber);font-weight:700}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

/* IMAGES */
.lesson-img{max-width:100%;max-height:200px;object-fit:contain;border-radius:10px;margin:.6rem auto;display:block;cursor:zoom-in}
.vi-img{width:100%;max-height:80px;object-fit:contain;border-radius:6px;margin-bottom:4px;display:block;cursor:zoom-in}
.fc-img{max-width:160px;max-height:90px;object-fit:contain;border-radius:8px;margin:0 auto .4rem;display:block;cursor:zoom-in}
.zi{cursor:zoom-in}
.lb-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:lbIn .15s ease}
@keyframes lbIn{from{opacity:0}to{opacity:1}}
.lb-ov img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:10px;box-shadow:0 12px 60px rgba(0,0,0,.7);cursor:zoom-out}

/* ANIMATIONS */
@keyframes pop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
.card,.speak-card,.reading-box,.hw-task,.exercise-card{animation:pop .3s ease both}

/* RESPONSIVE */
@media(max-width:620px){
  .match-grid{grid-template-columns:1fr}
  .vocab-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .lesson-header h1{font-size:1.6rem}
  .section{padding:24px 16px 60px}
  .fc-btn{padding:9px 12px;font-size:.82rem}
  .two-col{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="nav-bar">
  <a href="index.html" class="back-btn">&#8592; Lekcje</a>
  <nav class="nav-tabs" id="navTabs"></nav>
  <div class="save-indicator" id="saveStatus"></div>
</div>
<div id="mainContent"><div class="loading">Ładowanie lekcji...</div></div>

<script>
// ── SECURITY: sanitize teacher-authored HTML (strips scripts/event handlers) ──
function san(html) {
  if (typeof html !== 'string') return String(html == null ? '' : html);
  const d = document.createElement('div');
  d.textContent = ''; // reset
  // Use a template trick: parse without executing
  const t = document.createElement('template');
  t.innerHTML = html.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<iframe[\s\S]*?>/gi,'');
  t.content.querySelectorAll('*').forEach(el => {
    Array.from(el.attributes).forEach(a => {
      if (/^on/i.test(a.name) || (a.name === 'href' && /^javascript:/i.test(a.value))) el.removeAttribute(a.name);
    });
  });
  const tmp = document.createElement('div');
  tmp.appendChild(t.content.cloneNode(true));
  return tmp.innerHTML;
}
// Safe text (no HTML)
function txt(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── STATE ──
let lesson = null;
const QUIZ_DATA = {}; // keyed by questionId → {answer, options}
const FILL_DATA = {}; // keyed by fillId    → {answer}
let quizAnswered = {};
let fillChecked  = {};
let writeTexts   = {};
let fcStats      = {known:0, unknown:0};
let fcIdx        = 0;
let fcReversed   = false;
let checklistState = {};

// ── INIT ──
document.addEventListener('DOMContentLoaded', async () => {
  // ── AUTH CHECK ──
  const storedId   = localStorage.getItem('studentId');
  const storedCode = localStorage.getItem('lessonCode');
  if (!storedId || !storedCode) { location.replace('index.html'); return; }

  const id = new URLSearchParams(location.search).get('id');
  if (!id) { showErr('Brak parametru ?id= w URL. Wróć do <a href="index.html">listy lekcji</a>.'); return; }
  try {
    const progressQuery = storedId
      ? sb.from('lesson_progress').select('*').eq('student_id', storedId).eq('lesson_id', id).maybeSingle()
      : Promise.resolve({data: null});

    const [lessonResult, progressResult] = await Promise.all([
      sb.from('lessons').select('*').eq('id', id).single(),
      progressQuery
    ]);

    if (lessonResult.error || !lessonResult.data) {
      throw new Error('Nie znaleziono lekcji "' + id + '"');
    }

    const row = lessonResult.data;
    lesson = {
      id:           row.id,
      title:        row.title,
      subtitle:     row.subtitle,
      level:        row.level,
      headerEmoji:  row.header_emoji,
      tabs:         row.tabs || [],
      introduction: row.introduction,
      vocabulary:   row.vocabulary,
      grammar:      row.grammar,
      reading:      row.reading,
      exercises:    row.exercises,
      flashcards:   row.flashcards,
      homework:     row.homework,
      speaking:     row.speaking
    };

    // Restore saved progress from DB
    if (progressResult.data) {
      const prog = progressResult.data;
      if (prog.mywords) {
        let mwText;
        if (typeof prog.mywords === 'string') mwText = prog.mywords;
        else if (Array.isArray(prog.mywords)) mwText = prog.mywords.map(w => (w.pl||'') + (w.en ? ' — ' + w.en : '')).join('\n');
        else mwText = '';
        if (mwText) localStorage.setItem('mw_' + id, mwText);
      }
      if (prog.exercises) {
        (prog.exercises.quiz || []).forEach(q => {
          quizAnswered[q.question] = {correct:q.correct, chosen:q.chosen, answer:q.answer};
        });
        (prog.exercises.fill || []).forEach(f => {
          fillChecked[f.item] = {typed:f.typed, answer:f.answer, correct:f.correct};
        });
      }
      if (prog.flashcards) fcStats = {known: prog.flashcards.known||0, unknown: prog.flashcards.unknown||0};
      if (prog.homework) {
        Object.entries(prog.homework).forEach(([k, v]) => {
          if (k.startsWith('check_')) checklistState[k.slice(6)] = v;
          else writeTexts[k] = v;
        });
      }
    }

    buildPage();
  } catch(e) {
    showErr('Nie można załadować lekcji "' + txt(id) + '".<br><small>' + txt(e.message) + '</small>');
  }
});

function showErr(msg) {
  document.getElementById('mainContent').innerHTML = '<div class="err-box">' + msg + '</div>';
}

// ── BUILD PAGE ──
const TAB_LABELS = {
  introduction:'Introduction',
  vocabulary:'Vocabulary', grammar:'Grammar', reading:'Reading',
  exercises:'Exercises', speaking:'Speaking', flashcards:'Flashcards',
  homework:'Homework', mywords:'My Words'
};
const BADGE = {
  introduction:'INTRODUCTION',
  vocabulary:'VOCABULARY', grammar:'GRAMMAR', reading:'READING', exercises:'EXERCISES',
  speaking:'SPEAKING PRACTICE', flashcards:'FLASHCARDS', homework:'HOMEWORK', mywords:'MY WORDS'
};

function buildPage() {
  document.getElementById('pageTitle').textContent = (lesson.title || 'Lekcja') + ' — Owl\'s Academy';
  const tabs = lesson.tabs || ['vocabulary'];

  const nav = document.getElementById('navTabs');
  nav.innerHTML = '';
  tabs.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (i === 0 ? ' active' : '');
    btn.dataset.tab = t;
    btn.innerHTML = TAB_LABELS[t] || txt(t); // safe: TAB_LABELS contains only trusted HTML entity strings
    btn.addEventListener('click', () => showSection(t, btn));
    nav.appendChild(btn);
  });

  const content = document.getElementById('mainContent');
  content.innerHTML = '';
  tabs.forEach((t, i) => {
    const sec = document.createElement('div');
    sec.id = 'sec-' + t;
    sec.className = 'section' + (i === 0 ? ' active' : '');
    content.appendChild(sec);
    buildHeader(sec, t);
    buildSection(sec, t);
  });

  if (tabs.includes('flashcards') && lesson.flashcards?.length) initFC();
}

function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name)?.classList.add('active');
  btn?.classList.add('active');
}

function buildHeader(sec, tab) {
  let title = '', sub = '';
  if (tab === 'introduction') { title = lesson.title || ''; sub = lesson.introduction?.subtitle || 'Introduction · Warm-up'; }
  else if (tab === 'vocabulary') { title = lesson.title || ''; sub = lesson.vocabulary?.subtitle || lesson.subtitle || ''; }
  else if (tab === 'grammar')   { title = lesson.grammar?.title   || 'Grammar';   sub = lesson.grammar?.subtitle  || ''; }
  else if (tab === 'reading')   { title = lesson.reading?.title   || 'Reading';   sub = lesson.reading?.subtitle  || 'Read carefully'; }
  else if (tab === 'exercises') { title = 'Exercises';     sub = 'Test your knowledge'; }
  else if (tab === 'speaking')  { title = 'Speaking Practice'; sub = lesson.speaking?.subtitle || ''; }
  else if (tab === 'flashcards'){ title = 'Flashcards';     sub = 'Review vocabulary'; }
  else if (tab === 'homework')  { title = 'Homework';       sub = 'Complete before next lesson'; }
  else if (tab === 'mywords')   { title = 'My Vocabulary';  sub = 'Words you saved'; }

  const hdr = document.createElement('div');
  hdr.className = 'lesson-header';

  const badge = document.createElement('div');
  badge.className = 'badge';
  badge.textContent = (BADGE[tab] || tab.toUpperCase()) + (lesson.level ? ' · ' + lesson.level : '');
  hdr.appendChild(badge);

  const h1 = document.createElement('h1');
  h1.textContent = title;
  hdr.appendChild(h1);

  const p = document.createElement('p');
  p.textContent = sub;
  hdr.appendChild(p);

  sec.appendChild(hdr);
}

function buildSection(sec, tab) {
  switch(tab) {
    case 'introduction': buildIntroduction(sec); break;
    case 'vocabulary':  buildVocab(sec);     break;
    case 'grammar':     buildGrammar(sec);   break;
    case 'reading':     buildReading(sec);   break;
    case 'exercises':   buildExercises(sec); break;
    case 'speaking':    buildSpeaking(sec);  break;
    case 'flashcards':  buildFC(sec);        break;
    case 'homework':    buildHomework(sec);  break;
    case 'mywords':     buildMyWords(sec);   break;
  }
}

// ── HELPERS: DOM ──
function el(tag, className, text) {
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (text != null) e.textContent = text;
  return e;
}
function card(color) {
  return el('div', color && color !== 'default' ? 'card ' + color : 'card');
}
function makeTable(headers, rows, plCol, enCol) {
  const t = el('table');
  const hr = el('tr'); headers.forEach(h => { const th = el('th'); th.textContent = h; hr.appendChild(th); }); t.appendChild(hr);
  rows.forEach(row => {
    const tr = el('tr');
    row.forEach((cell, i) => {
      const td = document.createElement('td');
      if (i === plCol) td.className = 'pl-word';
      else if (i === enCol) td.className = 'en-word';
      if (typeof cell === 'object' && cell !== null) {
        // gender-coded cells like {m:'mój'} or {f:'moja'}
        Object.entries(cell).forEach(([k, v]) => {
          const span = document.createElement('span');
          span.className = k === 'm' ? 'poss-m' : k === 'f' ? 'poss-f' : k === 'n' ? 'poss-n' : '';
          span.textContent = v;
          td.appendChild(span);
        });
      } else { td.textContent = cell == null ? '' : cell; }
      tr.appendChild(td);
    });
    t.appendChild(tr);
  });
  return t;
}
function tipBox(text) {
  const d = el('div', 'tip-box');
  d.appendChild(document.createTextNode(text));
  return d;
}
function grammarBox(heading, text, tip) {
  const d = el('div', 'grammar-box');
  if (heading) { const h4 = el('h4', null, heading); d.appendChild(h4); }
  const p = el('p'); p.textContent = text || ''; d.appendChild(p);
  if (tip) d.appendChild(tipBox(tip));
  return d;
}

// ── VOCABULARY ──
function buildVocab(sec) {
  const v = lesson.vocabulary;
  if (!v) return;
  (v.sections || []).forEach(s => {
    const c = card(s.color);
    const h3 = el('h3', null, s.title || '');
    c.appendChild(h3);
    if (s.type === 'table' || s.rows) {
      const t = el('table');
      const hr = el('tr'); ['Polish','English'].forEach(h => { const th = el('th'); th.textContent = h; hr.appendChild(th); }); t.appendChild(hr);
      (s.rows || s.items || []).forEach(r => {
        const tr = el('tr');
        const td0 = el('td', 'pl-word');
        if (r.image) { const img = document.createElement('img'); img.src = r.image; img.alt = r.pl||''; img.className = 'zi'; img.style.cssText = 'height:32px;object-fit:contain;margin-right:8px;vertical-align:middle;border-radius:3px;display:inline-block;cursor:zoom-in'; td0.appendChild(img); }
        td0.appendChild(document.createTextNode(r.pl || ''));
        const td1 = el('td', 'en-word'); td1.textContent = r.en || '';
        tr.appendChild(td0); tr.appendChild(td1); t.appendChild(tr);
      });
      c.appendChild(t);
    } else {
      const grid = el('div', 'vocab-grid');
      (s.items || []).forEach(item => {
        const vi = el('div', 'vocab-item');
        if (item.image) { const img = document.createElement('img'); img.className = 'vi-img'; img.alt = item.pl || ''; img.src = item.image; vi.appendChild(img); }
        if (item.emoji) { const e = el('div', 'vi-emoji'); e.textContent = item.emoji; vi.appendChild(e); }
        vi.appendChild(el('div', 'vi-pl', item.pl));
        vi.appendChild(el('div', 'vi-en', item.en));
        const sb = el('button', 'save-btn', isSaved(item.pl, item.en) ? '★' : '☆');
        if (isSaved(item.pl, item.en)) sb.classList.add('saved');
        sb.title = 'Zapisz słówko';
        sb.addEventListener('click', e => { e.stopPropagation(); toggleSave(sb, item.pl, item.en); });
        vi.appendChild(sb);
        grid.appendChild(vi);
      });
      c.appendChild(grid);
    }
    sec.appendChild(c);
  });
  if (v.phrases?.length) {
    const c = card('purple');
    c.appendChild(el('h3', null, 'Useful Phrases'));
    c.appendChild(makeTable(['Polish','English'], v.phrases.map(p=>[p.pl,p.en]), 0, 1));
    sec.appendChild(c);
  }
}

      case 'info': {
        const c = card(b.color);
        c.appendChild(el('h3', null, b.title || ''));

      }
      case 'table': {
        const c = card(b.color || 'purple');
        c.appendChild(el('h3', null, b.title || ''));
        c.appendChild(makeTable(b.headers || [], b.rows || [], -1, -1));
        if (b.tip) { const t = tipBox(b.tip); t.style.marginTop = '1rem'; c.appendChild(t); }
        sec.appendChild(c); break;
      }
      case 'examples': {
        const c = card(b.color || 'green');
        c.appendChild(el('h3', null, b.title || 'Examples'));
        (b.items || []).forEach(ex => {
          const d = el('div', 'ex-box');
          if (ex.image) { const img = document.createElement('img'); img.className = 'lesson-img'; img.alt = ex.pl||''; img.src = ex.image; d.appendChild(img); }
          d.appendChild(el('div', 'ex-pl', ex.pl));
          d.appendChild(el('div', 'ex-en', ex.en));
          c.appendChild(d);
        });
        sec.appendChild(c); break;
      }
      case 'qa-table': {
        const c = card(b.color || 'red');
        c.appendChild(el('h3', null, b.title || '❓ Q&A'));
        c.appendChild(makeTable(b.headers || ['Polish','Example answer'], (b.rows||[]).map(r=>[r[0],r[1]||'']), 0, 1));
        sec.appendChild(c); break;
      }
      case 'two-col': {
        const c = card(b.color || 'yellow');
        c.appendChild(el('h3', null, b.title || ''));
        const grid = el('div', 'two-col');
        (b.columns || []).forEach(col => {
          const d = document.createElement('div');
          const hdr = el('p'); hdr.style.cssText = 'font-weight:700;margin-bottom:0.5rem;font-size:0.9rem'; hdr.textContent = col.header || '';

        if (b.tip) { const t = tipBox(b.tip); t.style.marginTop = '1rem'; c.appendChild(t); }
        sec.appendChild(c); break;
      }
    }
  });
}

function buildQuiz(sec, ex, xi) {
  const card2 = el('div', 'exercise-card');
  card2.appendChild(el('h4', null, ex.title || 'Quiz'));
  if (ex.desc) card2.appendChild(el('p', 'ex-desc', ex.desc));

  (ex.questions || []).forEach((q, qi) => {
    const qId = 'q' + xi + '_' + qi;
    QUIZ_DATA[qId] = {answer: q.answer, options: q.options || []};

    const wrap = el('div', 'quiz-q');
    wrap.id = qId;
    const p = el('p');
    p.innerHTML = san(q.q); // teacher-authored question may have <strong> etc.
    wrap.appendChild(p);
    if (q.image) { const img = document.createElement('img'); img.className = 'lesson-img'; img.alt = ''; img.src = q.image; wrap.appendChild(img); }

    const opts = el('div', 'quiz-opts');
    (q.options || []).forEach((opt, oi) => {
      const btn = el('button', 'qopt', opt);
      btn.dataset.qid = qId;
      btn.dataset.oi  = oi;
      btn.addEventListener('click', handleQuizClick);
      opts.appendChild(btn);
    });
    wrap.appendChild(opts);

    // Restore previously answered state
    const prevQ = quizAnswered[qId];
    if (prevQ) {
      opts.querySelectorAll('.qopt').forEach(b => {
        b.disabled = true;
        if (b.textContent.trim() === prevQ.answer) b.classList.add('correct');
        if (!prevQ.correct && b.textContent.trim() === prevQ.chosen) b.classList.add('wrong');
      });
    }

    const fb = el('div', 'feedback');
    fb.id = qId + '_fb';
    if (prevQ) {
      fb.textContent = prevQ.correct ? '✅ Correct!' : '❌ Correct answer: ' + prevQ.answer;
      fb.className = 'feedback ' + (prevQ.correct ? 'ok' : 'bad');
    }
    wrap.appendChild(fb);
    card2.appendChild(wrap);
  });
  sec.appendChild(card2);
}

function handleQuizClick(e) {
  const btn = e.currentTarget;
  const qId = btn.dataset.qid;
  const oi  = parseInt(btn.dataset.oi);
  const {answer, options} = QUIZ_DATA[qId];
  const chosen = options[oi];
  if (quizAnswered[qId]) return;

  const container = document.getElementById(qId);
  container.querySelectorAll('.qopt').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === answer) b.classList.add('correct');
  });
  const correct = chosen === answer;
  if (!correct) btn.classList.add('wrong');

  const fb = document.getElementById(qId + '_fb');
  if (fb) { fb.textContent = correct ? '✅ Correct!' : '❌ Correct answer: ' + answer; fb.className = 'feedback ' + (correct ? 'ok' : 'bad'); }

  quizAnswered[qId] = {correct, chosen, answer};
  updateScore();
  scheduleProgressSave();
}

function buildFill(sec, ex, xi) {
  const card2 = el('div', 'exercise-card');
  card2.appendChild(el('h4', null, ex.title || 'Fill in'));
  if (ex.desc) card2.appendChild(el('p', 'ex-desc', ex.desc));

  (ex.items || []).forEach((item, ii) => {
    const fId = 'f' + xi + '_' + ii;
    FILL_DATA[fId] = {answer: item.answer};
    const row = el('div', 'fill-row');
    if (item.before) row.appendChild(el('span', null, item.before));
    const inp = el('input', 'fill-input');
    inp.type = 'text'; inp.placeholder = '...'; inp.id = fId;
    const prevF = fillChecked[fId];
    if (prevF) {
      inp.value = prevF.typed;
      inp.classList.add(prevF.correct ? 'correct' : 'wrong');
      inp.disabled = true;
    }
    inp.addEventListener('input', () => { fillChecked[fId] = null; scheduleProgressSave(); });
    row.appendChild(inp);
    if (item.after) row.appendChild(el('span', null, item.after));
    if (item.hint)  row.appendChild(el('span', 'fill-hint', '(' + item.hint + ')'));
    card2.appendChild(row);
  });

  const allFillDone = (ex.items||[]).length > 0 && (ex.items||[]).every((_,ii) => fillChecked['f'+xi+'_'+ii]);
  const checkBtn = el('button', 'check-btn', '✅ Check Answers');
  if (allFillDone) { checkBtn.disabled = true; checkBtn.style.opacity = '0.6'; }
  checkBtn.addEventListener('click', () => checkFill(xi, ex));
  card2.appendChild(checkBtn);

  const res = el('div');
  res.id = 'fill_res_' + xi;
  res.style.cssText = 'margin-top:0.8rem;font-size:0.9rem;line-height:1.8';
  card2.appendChild(res);

  if (allFillDone) {
    const items = ex.items || [];
    const ok2 = items.filter((_,ii) => fillChecked['f'+xi+'_'+ii]?.correct).length;
    res.appendChild(el('strong', null, 'Wynik: ' + ok2 + '/' + items.length));
    items.forEach((_,ii) => {
      const r = fillChecked['f'+xi+'_'+ii]; if (!r) return;
      res.appendChild(document.createElement('br'));
      res.appendChild(document.createTextNode((r.correct?'✅':'❌')+' "'+r.typed+'"'+(r.correct?'':' → '+r.answer)));
    });
  }

  sec.appendChild(card2);
}

function checkFill(xi, ex) {
  let ok = 0; const lines = [];
  (ex.items || []).forEach((item, ii) => {
    const fId = 'f' + xi + '_' + ii;
    const inp = document.getElementById(fId);
    if (!inp) return;
    const typed = inp.value.trim();
    const isOk = typed.toLowerCase() === item.answer.toLowerCase();
    inp.classList.remove('correct','wrong');
    inp.classList.add(isOk ? 'correct' : 'wrong');
    inp.disabled = true;
    fillChecked[fId] = {typed, answer: item.answer, correct: isOk};
    if (isOk) ok++;
    lines.push((isOk ? '✅' : '❌') + ' "' + typed + '"' + (isOk ? '' : ' → ' + item.answer));
  });
  const res = document.getElementById('fill_res_' + xi);
  if (res) {
    const total = (ex.items || []).length;
    res.innerHTML = '';
    const strong = el('strong', null, 'Wynik: ' + ok + '/' + total);
    res.appendChild(strong);
    lines.forEach(l => { const br = document.createElement('br'); res.appendChild(br); res.appendChild(document.createTextNode(l)); });
  }
  updateScore();
  scheduleProgressSave();
}

function initFC() { fcIdx = 0; renderFC(); }
function renderFC() {
  const cards = lesson.flashcards;
  if (!cards?.length) return;
  const raw = cards[fcIdx];
  // Support both {word,translation} and {front,back} formats
  const c = (raw.word !== undefined) ? raw : {word: raw.front||'', translation: raw.back||'', emoji: raw.emoji||'', example: raw.example||'', image: raw.image||raw.frontImage||''};
  const el2 = id => document.getElementById(id);
  const fc = el2('flashcard');
  if (!fc) return;
  fc.classList.remove('flipped');
  const imgEl = el2('fc_img');
  if (imgEl) { if (c.image) { imgEl.src = c.image; imgEl.style.display = 'block'; } else { imgEl.style.display = 'none'; } }
  el2('fc_emoji').textContent = c.emoji || (c.image ? '' : '📚');
  // fcReversed: swap front (word) and back (translation)
  el2('fc_word').textContent  = fcReversed ? c.translation : c.word;
  el2('fc_trans').textContent = fcReversed ? c.word : c.translation;
  el2('fc_ex').textContent    = c.example || '';
  el2('fc_ctr').textContent   = 'Card ' + (fcIdx + 1) + ' of ' + cards.length;
  el2('fc_prog').style.width  = ((fcIdx + 1) / cards.length * 100) + '%';
  el2('fc_stats').textContent = 'Known: ' + fcStats.known + ' · Unknown: ' + fcStats.unknown;
}
function flipFC() { document.getElementById('flashcard')?.classList.toggle('flipped'); }
function navFC(d) { fcIdx = (fcIdx + d + lesson.flashcards.length) % lesson.flashcards.length; renderFC(); }
function markFC(known) { if (known) fcStats.known++; else fcStats.unknown++; updateScore(); scheduleProgressSave(); navFC(1); }

// ── HOMEWORK ──
function buildHomework(sec) {
  if (!lesson.homework?.length) return;
  lesson.homework.forEach((task, i) => {
    const hw = el('div', 'hw-task');
    const num = el('div', 'hw-num', String(i + 1));
    const body = el('div', 'hw-body');
    body.appendChild(el('h4', null, task.title || 'Task'));

    if (task.type === 'write') {
      if (task.prompt) {
        const p = el('p'); p.style.whiteSpace = 'pre-line'; p.textContent = task.prompt;
        body.appendChild(p);
      }
      const ta = el('textarea', 'write-box');
      ta.placeholder = 'Napisz tutaj...';
      const hwKey = 'hw' + i;
      if (writeTexts[hwKey]) ta.value = writeTexts[hwKey];
      ta.addEventListener('input', () => { writeTexts[hwKey] = ta.value; scheduleProgressSave(); });
      body.appendChild(ta);
    } else if (task.type === 'checklist') {
      (task.items || []).forEach((item, ii) => {
        const cid = 'cl' + i + '_' + ii;
        const cli = el('div', 'cl-item');
        const cb = el('input');
        cb.type = 'checkbox'; cb.id = cid;
        if (checklistState[cid]) { cb.checked = true; cli.classList.add('done'); }
        cb.addEventListener('change', () => { cli.classList.toggle('done', cb.checked); checklistState[cid] = cb.checked; scheduleProgressSave(); });
        cli.addEventListener('click', e => { if (e.target !== cb) { cb.checked = !cb.checked; cli.classList.toggle('done', cb.checked); checklistState[cid] = cb.checked; scheduleProgressSave(); } });
        const lbl = el('label', null, item); lbl.htmlFor = cid;
        cli.appendChild(cb); cli.appendChild(lbl);
        body.appendChild(cli);
      });
    }

    hw.appendChild(num); hw.appendChild(body);
    sec.appendChild(hw);
  });
}

// ── MY WORDS ──
function buildMyWords(sec) {
  const c = card('default');

  c.appendChild(hint);
  const ta = document.createElement('textarea');
  ta.id = 'mw-textarea';
  ta.className = 'write-box';
  ta.style.minHeight = '220px';
  ta.placeholder = 'Twoje słówka pojawią się tutaj po kliknięciu gwiazdki przy słówku...';
  ta.value = getMWText();
  ta.addEventListener('input', () => { saveMWText(ta.value); scheduleProgressSave(); });
  c.appendChild(ta);
  sec.appendChild(c);
}

function getMWText() { return localStorage.getItem('mw_' + (lesson?.id||'')) || ''; }
function saveMWText(text) { localStorage.setItem('mw_' + (lesson?.id||''), text); }
function isSaved(pl, en) {
  const t = getMWText();
  return t.includes(pl) && (!en || t.includes(en));
}
function toggleSave(btn, pl, en) {
  const text = getMWText();
  const line = pl + (en ? ' — ' + en : '');
  let newText;
  if (isSaved(pl, en)) {
    newText = text.split('\n').filter(l => !(l.includes(pl) && (!en || l.includes(en)))).join('\n');
    btn.textContent = '☆'; btn.classList.remove('saved');
  } else {
    newText = text ? text.trimEnd() + '\n' + line : line;
    btn.textContent = '★'; btn.classList.add('saved');
  }
  saveMWText(newText);
  const ta = document.getElementById('mw-textarea');
  if (ta) ta.value = newText;
  scheduleProgressSave();
}

// ── LIGHTBOX ──
function openLightbox(src) {
  let ov = document.getElementById('imgLightbox');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'imgLightbox'; ov.className = 'lb-ov';
    const img = document.createElement('img');
    ov.appendChild(img);
    ov.addEventListener('click', () => ov.remove());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('imgLightbox')?.remove(); });
    document.body.appendChild(ov);
  }
  ov.querySelector('img').src = src;
}
document.addEventListener('click', e => {
  if (e.target.tagName === 'IMG') {
    const cls = e.target.className || '';
    if (/lesson-img|vi-img|fc-img|(?:^|\s)zi(?:\s|$)/.test(cls)) openLightbox(e.target.src);
  }
});

let progressSaveTimer = null;
function showSaveStatus(msg, fade) {
  const el2 = document.getElementById('saveStatus');
  if (!el2) return;
  el2.textContent = msg; el2.style.opacity = '1';
  if (fade) setTimeout(() => { el2.style.opacity = '0'; }, fade);
}
async function flushProgressSave() {
  const studentId = localStorage.getItem('studentId');
  if (!studentId || !lesson?.id) return;
  const {total, ok} = calcScore();
  const pct = total > 0 ? Math.round(ok / total * 100) : null;
  const exercisesData = {
    quiz: Object.entries(quizAnswered).map(([k,v])=>({question:k,chosen:v.chosen,answer:v.answer,correct:v.correct})),
    fill: Object.entries(fillChecked).filter(([,v])=>v).map(([k,v])=>({item:k,typed:v.typed,answer:v.answer,correct:v.correct}))
  };
  const homeworkData = {};
  Object.entries(writeTexts).forEach(([k,v]) => { if (v) homeworkData[k] = v; });
  Object.entries(checklistState).forEach(([k,v]) => { if (v !== undefined) homeworkData['check_'+k] = v; });
  const {error} = await sb.from('lesson_progress').upsert({
    student_id: studentId,
    lesson_id:  lesson.id,
    score:      pct,
    exercises:  exercisesData,
    flashcards: {known: fcStats.known, unknown: fcStats.unknown},
    homework:   Object.keys(homeworkData).length ? homeworkData : null,
    mywords:    getMWText() || null
  }, {onConflict: 'student_id,lesson_id'});
  if (!error) showSaveStatus('Zapisano', 2500);
  else showSaveStatus('Błąd zapisu', 4000);
}
function scheduleProgressSave() {
  showSaveStatus('Zapisuję...');
  clearTimeout(progressSaveTimer);
  progressSaveTimer = setTimeout(flushProgressSave, 2000);
}
window.addEventListener('beforeunload', () => {
  if (progressSaveTimer) { clearTimeout(progressSaveTimer); flushProgressSave(); }
});

// ── INTRODUCTION ──
function buildIntroduction(sec) {
  const intro = lesson.introduction;
  if (!intro) return;
  (intro.sections || []).forEach(s => {
    switch(s.type) {
      case 'quote':         buildIntroQuote(sec, s);         break;
      case 'discussion':    buildIntroDiscussion(sec, s);    break;
      case 'article':       buildIntroArticle(sec, s);       break;
      case 'glossary':      buildIntroGlossary(sec, s);      break;
      case 'comprehension': buildIntroComprehension(sec, s); break;
      case 'speaking':      buildIntroSpeaking(sec, s);      break;
      case 'cta':           buildIntroCta(sec, s);           break;
      case 'image':         buildIntroImage(sec, s);         break;
      case 'html':          buildIntroHtml(sec, s);          break;
      case 'info':          buildIntroInfo(sec, s);          break;
    }
  });
}

    vi.className = 'vocab-item';
    const wordEl = el('div', 'vi-pl'); wordEl.style.marginBottom = '2px'; wordEl.textContent = item.word || '';
    vi.appendChild(wordEl);
    if (item.phonetic) {
      const ph = el('div');

      ph.textContent = item.phonetic; vi.appendChild(ph);

    hidden.style.display = 'none';
    if (item.translation) {
      const tr = el('div', 'vi-en'); tr.style.marginTop = '4px'; tr.textContent = '🇵🇱 ' + item.translation; hidden.appendChild(tr);
    }
    if (item.hint) {
      const h = el('div', 'vi-en'); h.style.fontStyle = 'italic'; h.textContent = item.hint; hidden.appendChild(h);
    }
    vi.appendChild(hidden);

}

function buildIntroInfo(sec, s) {
  const c = card(s.color || 'default');
  if (s.title) c.appendChild(el('h3', null, s.title));
  if (s.text) { const p = el('p'); p.style.fontSize = '0.92rem'; p.textContent = s.text; c.appendChild(p); }
  sec.appendChild(c);
}

// ── SCORE ──
function calcScore() {
  let total=0, ok=0;
  Object.values(quizAnswered).forEach(a => { total++; if (a.correct) ok++; });
  Object.values(fillChecked).forEach(a => { if (!a) return; total++; if (a.correct) ok++; });
  return {total, ok};
}
function updateScore() { /* score visible to admin via DB; no on-screen display needed */ }
</script>
