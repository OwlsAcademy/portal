// ── VOCAB MATCHING ──
function buildVocabMatching(c, blk) {
  const pairs = blk.pairs || [];
  if (!pairs.length) return;

  const uid = 'vm_' + Math.random().toString(36).slice(2);
  let selected = null, matched = 0;

  const grid = el('div', 'match-grid');
  const leftCol  = el('div', 'match-col');
  const rightCol = el('div', 'match-col');
  grid.appendChild(leftCol); grid.appendChild(rightCol);

  // Shuffle right side
  const shuffledRight = [...pairs].sort(() => Math.random() - .5);

  function renderItems() {
    leftCol.textContent = ''; rightCol.textContent = '';
    pairs.forEach((p, i) => {
      const w = el('button', 'match-item', p.word); w.dataset.word = p.word; w.dataset.side = 'left';
      w.addEventListener('click', () => selectVM(w, uid));
      leftCol.appendChild(w);
    });
    shuffledRight.forEach((p, i) => {
      const d = el('button', 'match-item', p.def); d.dataset.word = p.word; d.dataset.side = 'right';
      d.addEventListener('click', () => selectVM(d, uid));
      rightCol.appendChild(d);
    });
  }

  const _vmState = {};
  _vmState[uid] = { selected: null, matched: 0, pairs };
  window._vmState = window._vmState || {};
  window._vmState[uid] = _vmState[uid];

  function selectVM(el2, key) {
    const st = window._vmState[key];
    if (el2.classList.contains('matched')) return;
    if (!st.selected) { st.selected = el2; el2.classList.add('selected'); return; }
    if (st.selected === el2) { el2.classList.remove('selected'); st.selected = null; return; }
    if (st.selected.dataset.side === el2.dataset.side) {
      st.selected.classList.remove('selected'); st.selected = el2; el2.classList.add('selected'); return;
    }
    if (st.selected.dataset.word === el2.dataset.word) {
      st.selected.classList.remove('selected'); st.selected.classList.add('matched');
      el2.classList.add('matched'); st.matched++;
      if (st.matched === st.pairs.length) { scoreEl.textContent = 'Wszystkie dopasowane!'; scoreEl.style.color = 'var(--teal)'; }
    } else {
      const prev = st.selected;
      prev.classList.add('wrong-match'); el2.classList.add('wrong-match');
      setTimeout(() => { prev.classList.remove('selected','wrong-match'); el2.classList.remove('wrong-match'); }, 600);
    }
    st.selected = null;
  }
  window.selectVM = selectVM;

  c.appendChild(grid);
  const sRow = el('div', 'score-row');
  const scoreEl = el('span', 'score-txt');
  const rstBtn = el('button', 'check-btn', 'Losuj ponownie ↻'); rstBtn.style.cssText = 'margin-top:0;background:var(--cream);color:var(--ink);border:1.5px solid var(--border)';
  rstBtn.addEventListener('click', () => {
    shuffledRight.sort(() => Math.random() - .5);
    window._vmState[uid] = { selected: null, matched: 0, pairs };
    scoreEl.textContent = ''; scoreEl.style.color = '';
    renderItems();
  });
  sRow.appendChild(rstBtn); sRow.appendChild(scoreEl); c.appendChild(sRow);
  renderItems();
}

// ── VOCAB GAP FILL ──
function buildVocabGapFill(c, blk) {
  const items = blk.items || [];
  if (!items.length) return;

  if (blk.wordbank?.length) {
    const bankDiv = el('div', 'vgf-wordbank');
    bankDiv.innerHTML = 'Bank słów: <strong>' + blk.wordbank.filter(Boolean).join(' · ') + '</strong>';
    c.appendChild(bankDiv);
  }

  const allInputs = [];
  items.forEach((item, i) => {
    const d = el('div', 'vgf-item');
    const parts = item.sentence.split('___');
    parts.forEach((part, pi) => {
      d.appendChild(document.createTextNode(part));
      if (pi < parts.length - 1) {
        const inp = document.createElement('input');
        inp.className = 'vgf-input'; inp.type = 'text'; inp.placeholder = '…';
        inp.dataset.answer = item.answer || '';
        inp.autocomplete = 'off';
        allInputs.push(inp);
        d.appendChild(inp);
      }
    });
    const fb = el('div', 'vgf-fb'); fb.id = 'vgf_fb_' + i; d.appendChild(fb);
    c.appendChild(d);
  });

  const sRow = el('div', 'score-row');
  const chk = el('button', 'check-btn', 'Sprawdź'); chk.style.marginTop = '0';
  chk.addEventListener('click', () => {
    let ok = 0;
    allInputs.forEach((inp, i) => {
      const val = inp.value.trim().toLowerCase();
      const ans = inp.dataset.answer.toLowerCase();
      const fb  = document.getElementById('vgf_fb_' + i);
      if (val === ans) {
        inp.classList.add('correct'); inp.classList.remove('wrong'); ok++;
        if (fb) { fb.textContent = 'Dobrze!'; fb.className = 'vgf-fb show ok'; }
      } else {
        inp.classList.add('wrong'); inp.classList.remove('correct');
        if (fb) { fb.textContent = 'Odpowiedź: ' + inp.dataset.answer; fb.className = 'vgf-fb show bad'; }
      }
    });
    const sc = sRow.querySelector('.score-txt'); if (sc) sc.textContent = 'Wynik: ' + ok + ' / ' + allInputs.length;
  });
  const rst = el('button', 'check-btn', 'Reset'); rst.style.cssText = 'margin-top:0;background:var(--cream);color:var(--ink);border:1.5px solid var(--border)';
  rst.addEventListener('click', () => {
    allInputs.forEach((inp, i) => { inp.value = ''; inp.className = 'vgf-input'; const fb = document.getElementById('vgf_fb_' + i); if (fb) { fb.className = 'vgf-fb'; fb.textContent = ''; } });
    const sc = sRow.querySelector('.score-txt'); if (sc) sc.textContent = '';
  });
  const sc = el('span', 'score-txt'); sRow.appendChild(chk); sRow.appendChild(rst); sRow.appendChild(sc); c.appendChild(sRow);
}

// Collocations
const _collocState = {};
function buildCollocations(c, blk) {
  const key='col_'+Math.random().toString(36).slice(2);
  _collocState[key]={};
  (blk.blocks||[]).forEach((group,gi) => {
    const gb=el('div','colloc-block');
    gb.appendChild(el('div','colloc-keyword',group.keyword||''));
    if (group.instruction) gb.appendChild(el('div','colloc-instr',group.instruction));
    const opts=el('div','colloc-options'); opts.id=key+'_g'+gi;
    const totalCorrect=(group.options||[]).filter(o=>o.correct).length;
    if (!_collocState[key][gi]) _collocState[key][gi]={found:0,total:totalCorrect};
    (group.options||[]).forEach((opt,oi)=>{
      const btn=el('button','colloc-btn',opt.word);
      btn.addEventListener('click',()=>{
        if (opt.correct){btn.classList.add('correct');_collocState[key][gi].found++;if(_collocState[key][gi].found===_collocState[key][gi].total){const fb=gb.querySelector('.colloc-fb');if(fb){fb.textContent=group.note||'Dobrze!';fb.className='colloc-fb show';}}}
        else{btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),800);const fb=gb.querySelector('.colloc-fb');if(fb){fb.textContent='Ta kolokacja nie jest poprawna.';fb.className='colloc-fb show';}}
      });
      opts.appendChild(btn);
    });
    gb.appendChild(opts);
    const fb=el('div','colloc-fb'); gb.appendChild(fb);
    c.appendChild(gb);
  });
  const revBtn=el('button','check-btn','Pokaż wszystkie odpowiedzi'); revBtn.style.cssText='margin-top:0;background:var(--cream);color:var(--ink);border:1.5px solid var(--border)';
  revBtn.addEventListener('click',()=>{
    (blk.blocks||[]).forEach((group,gi)=>{
      const btns=document.querySelectorAll('#'+key+'_g'+gi+' .colloc-btn');
      group.options.forEach((opt,oi)=>{if(opt.correct&&!btns[oi].classList.contains('correct'))btns[oi].classList.add('revealed');if(!opt.correct)btns[oi].style.opacity='0.35';});
      const fb=c.querySelectorAll('.colloc-fb')[gi]; if(fb&&group.note){fb.textContent=group.note;fb.className='colloc-fb show';}
    });
  });
  c.appendChild(revBtn);
}

// Word Formation
function buildWordForm(c, blk) {
  const colKeys=['noun','verb','adj','adv'];
  const colLabels={noun:'Noun',verb:'Verb',adj:'Adjective',adv:'Adverb'};
  const table=el('table','wf-table');
  const hdrRow=el('tr'); const headers=['Root',...colKeys.map(k=>colLabels[k])]; headers.forEach(h=>{const th=el('th',null,h);hdrRow.appendChild(th);}); table.appendChild(hdrRow);
  const inputs=[];
  (blk.rows||[]).forEach((row,ri)=>{
    const tr=el('tr');
    const td0=el('td'); td0.appendChild(el('span','wf-root',row.root||'—')); tr.appendChild(td0);
    colKeys.forEach(col=>{
      const cell=row[col]; const td=el('td');
      if (!cell||(!cell.given&&!cell.answer)) { td.textContent='—'; }
      else if (cell.given==='—') { td.textContent='—'; }
      else if (cell.given!==null&&cell.given!==undefined) { td.appendChild(el('span','wf-given',cell.given)); }
      else { const inp=document.createElement('input'); inp.className='wf-input'; inp.placeholder='…'; inp.autocomplete='off'; inp.dataset.answer=cell.answer||''; inputs.push(inp); td.appendChild(inp); }
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });
  c.appendChild(table);
  const sRow=el('div','score-row');
  const chk=el('button','check-btn','Sprawdź'); chk.style.marginTop='0';
  chk.addEventListener('click',()=>{
    let ok=0,tot=0;
    inputs.forEach(inp=>{ tot++; const correct=inp.dataset.answer.toLowerCase(); const val=inp.value.trim().toLowerCase(); if(val===correct){inp.classList.add('correct');inp.classList.remove('wrong');ok++;}else{inp.classList.add('wrong');inp.classList.remove('correct');inp.title='Odpowiedź: '+inp.dataset.answer;} });
    const sc=sRow.querySelector('.score-txt'); if(sc)sc.textContent='Wynik: '+ok+' / '+tot;
  });
  const rst=el('button','check-btn','Reset'); rst.style.cssText='margin-top:0;background:var(--cream);color:var(--ink);border:1.5px solid var(--border)';
  rst.addEventListener('click',()=>{ inputs.forEach(inp=>{inp.value='';inp.className='wf-input';inp.title='';}); const sc=sRow.querySelector('.score-txt'); if(sc)sc.textContent=''; });
  const sc=el('span','score-txt'); sRow.appendChild(chk); sRow.appendChild(rst); sRow.appendChild(sc); c.appendChild(sRow);
}

function openLightbox(src) {

let progressSaveTimer = null;
function showSaveStatus(msg, fade) {
  const el2 = document.getElementById('saveStatus');
  if (!el2) return;
  el2.textContent = msg; el2.style.opacity = '1';
  if (fade) setTimeout(() => { el2.style.opacity = '0'; }, fade);
}
async function flushProgressSave() {
  const studentId = localStorage.getItem('studentId');
  if (!studentId || !lesson?.id) return;
  const {total, ok} = calcScore();
  const pct = total > 0 ? Math.round(ok / total * 100) : null;
  const exercisesData = {
    quiz: Object.entries(quizAnswered).map(([k,v])=>({question:k,chosen:v.chosen,answer:v.answer,correct:v.correct})),
    fill: Object.entries(fillChecked).filter(([,v])=>v).map(([k,v])=>({item:k,typed:v.typed,answer:v.answer,correct:v.correct}))
  };
  const homeworkData = {};
  Object.entries(writeTexts).forEach(([k,v]) => { if (v) homeworkData[k] = v; });
  Object.entries(checklistState).forEach(([k,v]) => { if (v !== undefined) homeworkData['check_'+k] = v; });
  const {error} = await sb.from('lesson_progress').upsert({
    student_id: studentId,
    lesson_id:  lesson.id,
    score:      pct,
    exercises:  exercisesData,
    flashcards: {known: fcStats.known, unknown: fcStats.unknown},
    homework:   Object.keys(homeworkData).length ? homeworkData : null,
    mywords:    getMWText() || null
  }, {onConflict: 'student_id,lesson_id'});
  if (!error) showSaveStatus('Zapisano', 2500);
  else showSaveStatus('Błąd zapisu', 4000);
}
function scheduleProgressSave() {
  showSaveStatus('Zapisuję...');
  clearTimeout(progressSaveTimer);
  progressSaveTimer = setTimeout(flushProgressSave, 2000);
}
window.addEventListener('beforeunload', () => {
  if (progressSaveTimer) { clearTimeout(progressSaveTimer); flushProgressSave(); }
});

function buildIntroduction(sec) {
  const intro = lesson.introduction;
  if (!intro) return;
  (intro.sections || []).forEach(s => {
    switch(s.type) {
      case 'quote':         buildIntroQuote(sec, s);         break;
      case 'discussion':    buildIntroDiscussion(sec, s);    break;
      case 'article':       buildIntroArticle(sec, s);       break;
      case 'glossary':      buildIntroGlossary(sec, s);      break;
      case 'comprehension': buildIntroComprehension(sec, s); break;
      case 'speaking':      buildIntroSpeaking(sec, s);      break;
      case 'cta':           buildIntroCta(sec, s);           break;
      case 'image':         buildIntroImage(sec, s);         break;
      case 'html':          buildIntroHtml(sec, s);          break;

  });
}

  d.innerHTML = san(s.html || ''); // teacher-authored custom HTML block
  sec.appendChild(d);
}

function buildIntroInfo(sec, s) {
  const c = card(s.color || 'default');
  if (s.title) c.appendChild(el('h3', null, s.title));
  if (s.text) { const p = el('p'); p.style.fontSize = '0.92rem'; p.textContent = s.text; c.appendChild(p); }
  sec.appendChild(c);
}

// ── SCORE ──
function calcScore() {
  let total=0, ok=0;
  Object.values(quizAnswered).forEach(a => { total++; if (a.correct) ok++; });
  Object.values(fillChecked).forEach(a => { if (!a) return; total++; if (a.correct) ok++; });
  return {total, ok};
}
